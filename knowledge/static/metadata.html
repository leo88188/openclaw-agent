<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元数据 - Knowledge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
    <main class="ml-56 p-10 relative">
        <div class="flex items-center justify-between mb-8">
            <div class="title-enter">
                <h2 class="text-3xl font-bold font-display tracking-tight" style="color:var(--text-primary)">数据库元数据</h2>
                <p class="mt-2" style="color:var(--text-muted)">浏览和管理数据库表结构</p>
            </div>
            <button onclick="showImport()" class="btn-accent">
                <i class="fa fa-download mr-1"></i>导入元数据
            </button>
        </div>

        <div class="grid grid-cols-8 gap-5">
            <div id="table-list" class="col-span-3 card p-5 max-h-[70vh] overflow-y-auto stagger"></div>
            <div id="table-detail" class="col-span-5 card p-5 stagger" style="animation-delay:0.1s">
                <div class="empty-state text-center py-16"><i class="fa fa-hand-pointer-o text-3xl mb-3 block"></i><p>选择左侧表查看详情</p></div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
    <script>
    async function loadTables() {
        try {
            const data = await api.getTableList();
            if (!data.items.length) { $('#table-list').html(components.emptyState('暂无表数据')); return; }
            let html = '<div class="space-y-1">';
            data.items.forEach(t => {
                html += `<div onclick="showTable('${escapeHtml(t.table_name)}')" class="p-3 rounded-lg cursor-pointer transition" style="color:var(--text-secondary)" onmouseover="this.style.background='var(--bg-card-hover)'" onmouseout="this.style.background='transparent'">
                    <div class="font-mono text-sm font-semibold" style="color:var(--text-primary)">${escapeHtml(t.table_name)}</div>
                    <div class="text-xs mt-1" style="color:var(--text-muted)">${escapeHtml(t.table_comment || '')}</div>
                </div>`;
            });
            html += '</div>';
            $('#table-list').html(html);
        } catch(e) { $('#table-list').html(components.emptyState('加载失败')); }
    }

    async function showTable(name) {
        const data = await api.getTable(name);
        let html = `<h3 class="font-display font-semibold text-lg mb-1" style="color:var(--text-primary)">${escapeHtml(data.table_name)}</h3>
            <p class="text-sm mb-5" style="color:var(--text-muted)">${escapeHtml(data.table_comment || '')}</p>
            <table class="table-dark w-full text-sm"><thead><tr>
                <th class="text-left">字段名</th><th class="text-left">类型</th><th class="text-left">说明</th></tr></thead><tbody>`;
        data.columns.forEach(c => {
            html += `<tr><td class="font-mono">${escapeHtml(c.name)}</td><td>${escapeHtml(c.type)}</td><td>${escapeHtml(c.comment || '')}</td></tr>`;
        });
        html += '</tbody></table>';
        $('#table-detail').html(html);
    }

    function showImport() {
        components.modal('导入元数据', `<input id="m-dbname" class="input-dark w-full" placeholder="数据库名称" value="knowledge">`, async () => {
            const res = await api.importMetadata($('#m-dbname').val());
            components.toast('导入成功：' + res.imported + ' 条', 'success');
            loadTables();
        });
    }

    $(function() { loadTables(); });
    </script>
</body>
</html>
