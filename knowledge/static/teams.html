<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队空间 - Knowledge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
    <main class="ml-56 p-10 relative">
        <div class="geo-deco w-12 h-12 top-8 right-20 opacity-15" style="animation-delay:1.5s;border-radius:50%"></div>

        <div class="flex items-center justify-between mb-8">
            <div class="title-enter">
                <h2 class="text-3xl font-bold font-display tracking-tight" style="color:var(--text-primary)">团队空间</h2>
                <p class="mt-2" style="color:var(--text-muted)">管理团队和成员权限</p>
            </div>
            <button onclick="showCreateTeam()" class="btn-accent">
                <i class="fa fa-plus mr-1"></i>创建团队
            </button>
        </div>
        <div id="team-list" class="grid grid-cols-4 gap-5"></div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
    <script>
    async function loadTeams() {
        try {
            const data = await api.getTeamList();
            if (!data.items.length) { $('#team-list').html(components.emptyState('暂无团队')); return; }
            let html = '';
            data.items.forEach((t, i) => {
                html += `
                <div class="card p-5 card-hover stagger" style="animation-delay:${i*0.05}s">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-4" style="background:var(--accent-dim)">
                        <i class="fa fa-users" style="color:var(--accent)"></i>
                    </div>
                    <h3 class="font-display font-semibold" style="color:var(--text-primary)">${escapeHtml(t.name)}</h3>
                    <p class="text-sm mt-2" style="color:var(--text-secondary)">${escapeHtml(t.description || '暂无描述')}</p>
                    <div class="text-xs mt-4" style="color:var(--text-muted)">创建者: ${escapeHtml(t.created_by || '-')}</div>
                </div>`;
            });
            $('#team-list').html(html);
        } catch(e) { $('#team-list').html(components.emptyState('加载失败')); }
    }

    function showCreateTeam() {
        components.modal('创建团队', `
            <input id="m-name" class="input-dark w-full mb-3" placeholder="团队名称">
            <textarea id="m-desc" class="input-dark w-full" rows="3" placeholder="团队描述"></textarea>
        `, async () => {
            await api.createTeam({ name: $('#m-name').val(), description: $('#m-desc').val() });
            components.toast('创建成功', 'success');
            loadTeams();
        });
    }

    $(function() { loadTeams(); });
    </script>
</body>
</html>
